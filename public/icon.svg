<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Green rounded rectangle background -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="#22c55e"/>
  
  <!-- White line chart icon -->
  <g transform="translate(256, 256)">
    <!-- Chart line path showing upward trend -->
    <polyline 
      points="-80,-40 -20,20 40,-20 100,40" 
      stroke="white" 
      stroke-width="20" 
      stroke-linecap="round" 
      stroke-linejoin="round" 
      fill="none"
    />
    
    <!-- Data points on the chart line -->
    <circle cx="-80" cy="-40" r="8" fill="white"/>
    <circle cx="-20" cy="20" r="8" fill="white"/>
    <circle cx="40" cy="-20" r="8" fill="white"/>
    <circle cx="100" cy="40" r="8" fill="white"/>
  </g>
</svg>
